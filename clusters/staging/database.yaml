---
 apiVersion: kustomize.toolkit.fluxcd.io/v1
 kind: Kustomization
 metadata:
   name: database-dependencies
   namespace: flux-system
 spec:
   interval: 1m0s
   retryInterval: 1m
   timeout: 5m
   sourceRef:
     kind: GitRepository
     name: flux-system
   path: ./databases/dependencies
   prune: true
   decryption:
     provider: sops
     secretRef:
       name: sops-age
