 apiVersion: kustomize.toolkit.fluxcd.io/v1
 kind: Kustomization
 metadata:
   name: testing-first
   namespace: flux-system
 spec:
   interval: 1m0s
   retryInterval: 1m
   timeout: 5m
   sourceRef:
     kind: GitRepository
     name: flux-system
   path: ./testing/fail/first
   wait: true
   prune: true
   decryption:
     provider: sops
     secretRef:
       name: sops-age
---
 apiVersion: kustomize.toolkit.fluxcd.io/v1
 kind: Kustomization
 metadata:
   name: testing-second
   namespace: flux-system
 spec:
   interval: 1m0s
   retryInterval: 1m
   timeout: 5m
   sourceRef:
     kind: GitRepository
     name: flux-system
   path: ./testing/fail/second
   dependsOn:
     - name: testing-first
   prune: true
   decryption:
     provider: sops
     secretRef:
       name: sops-age
