apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: highlander
  name: highlander
  namespace: highlander
spec:
  replicas: 1
  selector:
    matchLabels:
      app: highlander
  template:
    metadata:
      labels:
        app: highlander
    spec:
      securityContext:
        fsGroup: 33
        runAsUser: 33
        runAsGroup: 33
      containers:
        - image: ghcr.io/nleahy/hello-vapor@sha256:b4704ec67e1c83a3565c9473d0ccbd569d570367fd8e6fb9951ca59d1f73a7d0
          name: highlander
          env:
          - name: DATABASE_URL
            value: "postgres://app@highlander-db-rw.highlander:5432/app"
          - name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: highlander-db-app
                key: password
          ports:
          -  containerPort: 9001
      imagePullSecrets:
      - name: ghcr-pull-secret