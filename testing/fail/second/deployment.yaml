apiVersion: apps/v1
kind: Deployment
metadata:
  name: should-not-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fail-app
  template:
    metadata:
      labels:
        app: fail-app
    spec:
      containers:
      - name: test-container
        image: nginx
        ports:
        - containerPort: 80
